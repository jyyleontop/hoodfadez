<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bookings — Hoodfadez</title>
<link rel="manifest" href="/static/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Hoodfadez" />
<style>
  :root{--bg:#0a0a0a;--ink:#f5f1e8;--gold:#c9a24a;--muted:#8a8578;--line:rgba(245,241,232,.1);--err:#e85a4f;--ok:#5ac28a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;min-height:100vh;padding:30px 20px;padding-bottom:60px}
  .top{display:flex;justify-content:space-between;align-items:center;max-width:760px;margin:0 auto 28px;gap:12px;flex-wrap:wrap}
  .logo{font-family:Georgia,serif;font-size:20px;letter-spacing:3px;color:var(--gold);font-weight:700;text-decoration:none}
  .logo span{color:var(--ink)}
  .push-btn{padding:10px 18px;font-size:11px;letter-spacing:2px;text-transform:uppercase;background:transparent;border:1px solid var(--gold);color:var(--gold);cursor:pointer;transition:all .3s}
  .push-btn:hover{background:var(--gold);color:var(--bg)}
  .push-btn.on{background:var(--ok);border-color:var(--ok);color:var(--bg)}
  h1{font-family:Georgia,serif;font-size:32px;max-width:760px;margin:0 auto 6px}
  h1 em{color:var(--gold);font-style:italic}
  .sub{color:var(--muted);font-size:12px;letter-spacing:3px;text-transform:uppercase;max-width:760px;margin:0 auto 24px}
  .filters{display:flex;gap:8px;max-width:760px;margin:0 auto 20px;flex-wrap:wrap}
  .filter{padding:8px 14px;font-size:11px;letter-spacing:2px;text-transform:uppercase;border:1px solid var(--line);color:var(--muted);cursor:pointer;background:transparent;transition:all .3s}
  .filter.on{border-color:var(--gold);color:var(--gold)}
  .list{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
  .group-label{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin:18px 0 4px;border-bottom:1px solid var(--line);padding-bottom:6px}
  .booking{display:grid;grid-template-columns:90px 1fr auto;gap:16px;padding:18px;border:1px solid var(--line);background:rgba(255,255,255,.03);align-items:center;transition:border-color .3s}
  .booking:hover{border-color:var(--gold)}
  .booking.past{opacity:.45}
  .when{text-align:center;border-right:1px solid var(--line);padding-right:12px}
  .when .time{font-family:Georgia,serif;font-size:22px;color:var(--gold);font-weight:700}
  .when .date{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:4px}
  .who .name{font-size:16px;font-weight:600;margin-bottom:4px}
  .who .phone{font-size:13px;color:var(--muted)}
  .who .phone a{color:var(--muted);text-decoration:none}
  .who .phone a:hover{color:var(--gold)}
  .svc{font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:6px 10px;border:1px solid var(--gold);color:var(--gold);white-space:nowrap}
  .svc.beard{background:var(--gold);color:var(--bg)}
  .empty{text-align:center;color:var(--muted);font-size:13px;letter-spacing:2px;text-transform:uppercase;padding:60px 20px;border:1px dashed var(--line)}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;border:1px solid var(--gold);color:var(--ink);padding:14px 22px;font-size:13px;letter-spacing:1px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
  .toast.show{opacity:1}
  @media(max-width:560px){
    .booking{grid-template-columns:74px 1fr;}
    .svc{grid-column:1/-1;justify-self:start}
  }
</style>
</head>
<body>
<div class="top">
  <a href="/" class="logo">HOOD<span>FADEZ</span></a>
  <button class="push-btn" id="pushBtn">Enable Notifications</button>
</div>
<h1>Today's <em>Chair</em></h1>
<div class="sub">Barber dashboard · auto-refresh every 30s</div>

<div class="filters">
  <button class="filter on" data-f="upcoming">Upcoming</button>
  <button class="filter" data-f="today">Today</button>
  <button class="filter" data-f="all">All</button>
</div>

<div class="list" id="list"><div class="empty">Loading…</div></div>
<div class="toast" id="toast"></div>

<script>
let allBookings = [], filter = 'upcoming', lastIds = new Set();

const $ = s => document.querySelector(s);
const pad = n => String(n).padStart(2,'0');
const toast = msg => { const t=$('#toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); };

function bookingDateTime(b){
  const [h,m] = b.time.split(':').map(Number);
  const d = new Date(b.date + 'T00:00:00');
  d.setHours(h,m,0,0);
  return d;
}

function render(){
  const list = $('#list'); list.innerHTML = '';
  const now = new Date();
  const todayStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;

  let items = allBookings.slice().sort((a,b) => bookingDateTime(a) - bookingDateTime(b));
  if (filter === 'upcoming') items = items.filter(b => bookingDateTime(b) >= now);
  else if (filter === 'today') items = items.filter(b => b.date === todayStr);

  if (!items.length){ list.innerHTML = '<div class="empty">No bookings</div>'; return; }

  let lastDate = '';
  items.forEach(b => {
    if (b.date !== lastDate){
      const lbl = document.createElement('div');
      lbl.className = 'group-label';
      const d = new Date(b.date + 'T00:00:00');
      lbl.textContent = d.toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'});
      list.appendChild(lbl);
      lastDate = b.date;
    }
    const past = bookingDateTime(b) < now;
    const el = document.createElement('div');
    el.className = 'booking' + (past ? ' past' : '');
    const svcLabel = b.service === 'hair_beard' ? 'Hair + Beard' : 'Haircut';
    el.innerHTML = `
      <div class="when"><div class="time">${b.time}</div><div class="date">${b.duration||30}m</div></div>
      <div class="who"><div class="name">${escapeHtml(b.name)}</div><div class="phone"><a href="tel:${escapeHtml(b.phone)}">${escapeHtml(b.phone)}</a></div></div>
      <div class="svc ${b.service==='hair_beard'?'beard':''}">${svcLabel}</div>`;
    list.appendChild(el);
  });
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

document.querySelectorAll('.filter').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.filter').forEach(x => x.classList.remove('on'));
  b.classList.add('on'); filter = b.dataset.f; render();
}));

async function load(initial=false){
  try {
    const r = await fetch('/api/bookings');
    if (!r.ok) return;
    const data = await r.json();
    const newOnes = data.filter(b => !lastIds.has(b.id));
    if (!initial && newOnes.length){
      newOnes.forEach(b => toast(`New: ${b.name} · ${b.date} ${b.time}`));
    }
    lastIds = new Set(data.map(b => b.id));
    allBookings = data;
    render();
  } catch {}
}

// ---------- Push notifications (works as installed PWA on iOS 16.4+) ----------
const pushBtn = $('#pushBtn');
async function setupPush(){
  if (!('serviceWorker' in navigator) || !('PushManager' in window)){
    pushBtn.textContent = 'Push not supported'; pushBtn.disabled = true; return;
  }
  const reg = await navigator.serviceWorker.register('/static/sw.js');
  const sub = await reg.pushManager.getSubscription();
  if (sub) pushBtn.classList.add('on'), pushBtn.textContent = 'Notifications On';
}
pushBtn.addEventListener('click', async () => {
  try {
    const reg = await navigator.serviceWorker.register('/static/sw.js');
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') return toast('Permission denied');
    const keyRes = await fetch('/api/vapid-key');
    const { publicKey } = await keyRes.json();
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlB64ToUint8Array(publicKey)
    });
    await fetch('/api/subscribe', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(sub) });
    pushBtn.classList.add('on'); pushBtn.textContent = 'Notifications On';
    toast('Notifications enabled');
  } catch(e){ toast('Push setup failed'); console.error(e); }
});
function urlB64ToUint8Array(b64){
  const padding = '='.repeat((4 - b64.length % 4) % 4);
  const base64 = (b64 + padding).replace(/-/g,'+').replace(/_/g,'/');
  const raw = atob(base64); const out = new Uint8Array(raw.length);
  for (let i=0;i<raw.length;i++) out[i] = raw.charCodeAt(i);
  return out;
}

setupPush();
load(true);
setInterval(load, 30000);
</script>
</body>
</html>
